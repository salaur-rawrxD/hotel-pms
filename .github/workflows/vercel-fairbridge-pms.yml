# Deploys the Vite app to Vercel project "fairbridge-pms" (ids match hotel-pms/client/.vercel/project.json).
#
# 1) Repository secret:  VERCEL_TOKEN  →  https://vercel.com/account/tokens
# 2) Repository variable: VERCEL_DEPLOY = true  (Settings → Secrets and variables → Actions → Variables)
#    Pushes are skipped until both are set, so missing-token runs don’t fail CI.
# 3) Or run "Run workflow" manually (workflow_dispatch) on the branch you want.

name: Vercel — fairbridge-pms

on:
  push:
    branches: [main, dev]
    paths:
      - "hotel-pms/client/**"
      - "vercel.json"
      - ".github/workflows/vercel-fairbridge-pms.yml"
  workflow_dispatch: {}

concurrency:
  group: vercel-fairbridge-${{ github.ref }}
  cancel-in-progress: true

jobs:
  production:
    if: |
      github.ref == 'refs/heads/main' && (
        vars.VERCEL_DEPLOY == 'true' || github.event_name == 'workflow_dispatch'
      )
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: team_yMEMwmBcbguyvpNcWypEZdlM
          vercel-project-id: prj_9vOLFZ0lgaUNpIIjlrrIlBO4o67Q
          working-directory: hotel-pms/client
          vercel-args: --prod

  preview:
    if: |
      github.ref == 'refs/heads/dev' && (
        vars.VERCEL_DEPLOY == 'true' || github.event_name == 'workflow_dispatch'
      )
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: team_yMEMwmBcbguyvpNcWypEZdlM
          vercel-project-id: prj_9vOLFZ0lgaUNpIIjlrrIlBO4o67Q
          working-directory: hotel-pms/client
